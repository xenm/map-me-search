name: Deploy Frontend to Hugging Face

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: deploy-hf-app-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Deploy the Mini-Frontend to Hugging Face Spaces
  # ============================================================================
  deploy-huggingface:
    name: Deploy Frontend to Hugging Face
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Validate Hugging Face credentials
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN is not set"
            exit 1
          fi
          if [ -z "$HF_USERNAME" ]; then
            echo "Error: HF_USERNAME is not set"
            exit 1
          fi
          if [ -z "$HF_SPACE_NAME" ]; then
            echo "Error: HF_SPACE_NAME is not set"
            exit 1
          fi
          echo "All required environment variables are set"

      - name: Install huggingface_hub
        run: pip install --disable-pip-version-check 'huggingface_hub>=0.27,<0.28'

      # Use huggingface_hub API instead of git push for better DevSecOps practices in a public repo (no token in Git remotes/logs)
      # Note: upload_folder() does not respect .gitignore, so allow_patterns is used to explicitly whitelist deployable files
      # delete_patterns="*" ensures the Space exactly mirrors the local folder by removing orphaned files from previous deployments
      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME }}
        run: |
          echo "🚀 Deploying frontend to Hugging Face Spaces..."
          python << 'EOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          username = os.environ["HF_USERNAME"]
          space_name = os.environ["HF_SPACE_NAME"]
          repo_id = f"{username}/{space_name}"

          api = HfApi(token=token)
          api.upload_folder(
              folder_path="frontend",
              repo_id=repo_id,
              repo_type="space",
              commit_message="Deploy frontend from GitHub Actions",
              # Explicitly whitelist only files that should be in the Space (upload_folder doesn't respect .gitignore)
              allow_patterns=["*.py", "requirements.txt", "README.md", ".env.example"],
              ignore_patterns=[".git/*", "__pycache__/*", "*.pyc"],
              # Ensure the Space exactly mirrors the local folder by removing orphaned files from previous deployments
              delete_patterns="*"
          )
          print("✅ Deployment to Hugging Face completed!")
          EOF

  # ============================================================================
  # Summary
  # ============================================================================
  deployment-summary:
    name: Deployment Summary
    permissions: {}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-huggingface]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "==================== HF SPACE DEPLOYMENT SUMMARY ===================="
          echo ""
          echo "HF Space: ${{ needs.deploy-huggingface.result }}"
          echo ""
          echo "====================================================================="
