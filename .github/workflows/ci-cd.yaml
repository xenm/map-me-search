name: CI / CD

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - 'Dockerfile'
      - 'frontend/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Run CI
    uses: ./.github/workflows/ci.yaml
    permissions:
      contents: read

  # Detect which paths changed so we only deploy what's needed
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy-hf-app.yaml'
            agent:
              - 'agent/**'
              - 'Dockerfile'
              - '.github/workflows/deploy-agent-api.yaml'

  deploy-hf-app:
    name: Deploy Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/deploy-hf-app.yaml
    secrets: inherit
    permissions:
      contents: read

  deploy-agent-api:
    name: Deploy Agent API
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    uses: ./.github/workflows/deploy-agent-api.yaml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
