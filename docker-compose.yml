services:
  postgres:
    image: postgres:16-alpine
    container_name: mapme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mapme
      POSTGRES_PASSWORD: mapme
      POSTGRES_DB: mapme
    ports:
      - "5432:5432"
    volumes:
      - mapme_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapme -d mapme"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mapme_pgdata:
